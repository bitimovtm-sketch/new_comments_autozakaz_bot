name: Битрикс24 → Telegram уведомления

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-comments:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установить зависимости
        run: pip install requests

      - name: Загрузить состояние из ветки
        run: |
          git fetch origin state 2>/dev/null && \
          git show origin/state:last_check_state.json > last_check_state.json 2>/dev/null || \
          echo "Первый запуск — файл состояния будет создан"

      - name: Запустить проверку комментариев
        env:
          BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
        run: python check_comments.py

      - name: Сохранить состояние в ветку
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin state 2>/dev/null || git checkout --orphan state
          git checkout origin/state 2>/dev/null || true
          git checkout --orphan state 2>/dev/null || git checkout state 2>/dev/null || true
          cp last_check_state.json /tmp/last_check_state.json
          git checkout --orphan state-new
          git rm -rf . --quiet 2>/dev/null || true
          cp /tmp/last_check_state.json last_check_state.json
          git add last_check_state.json
          git commit -m "Обновление состояния [skip ci]"
          git push origin HEAD:state --force
