name: Битрикс24 → Telegram уведомления

on:
  schedule:
    # Запускается каждые 10 минут (минимальный интервал GitHub Actions)
    - cron: '*/10 * * * *'
  workflow_dispatch:  # Позволяет запустить вручную из интерфейса GitHub

jobs:
  check-comments:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установить зависимости
        run: pip install requests

      - name: Восстановить состояние (последние просмотренные комментарии)
        uses: actions/cache@v4
        with:
          path: last_check_state.json
          key: bitrix-state-v1
          restore-keys: bitrix-state-v1

      - name: Запустить проверку комментариев
        env:
          BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
        run: python check_comments.py

      - name: Сохранить состояние
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_check_state.json
          key: bitrix-state-v1-${{ github.run_id }}
